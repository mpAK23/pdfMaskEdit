<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Split & Mask</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="./assets/index-2joml7-v.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DFDx_gfj.css">
  </head>
  <body>
    <div id="app">
      <header class="app-header">
        <div class="header-content">
          <h1>PDF Split & Mask</h1>
          <p>Import a PDF, mask sensitive text, and export separate sections as individual PDFs.</p>
        </div>
        <div class="actions">
          <label for="pdf-upload" class="btn primary-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            Upload PDF
          </label>
          <input type="file" id="pdf-upload" accept="application/pdf" />
          
          <label class="control-label" style="display: flex; align-items: center; gap: 0.5rem; color: var(--text-primary); cursor: pointer; background: rgba(0,0,0,0.2); padding: 0.5rem 1rem; border-radius: 0.75rem;">
            <input type="checkbox" id="playscore-mode" checked style="width: 1rem; height: 1rem; accent-color: var(--accent-color);" />
            - for OMR Import
          </label>

          <label class="control-label" style="display: flex; align-items: center; gap: 0.5rem; color: var(--text-primary); cursor: pointer; background: rgba(0,0,0,0.2); padding: 0.5rem 1rem; border-radius: 0.75rem;">
            Darken:
            <select id="darken-level" style="background: transparent; color: inherit; border: 1px solid rgba(255,255,255,0.3); border-radius: 0.25rem; padding: 0.2rem; outline: none; cursor: pointer;">
              <option value="0" style="color: black;">None</option>
              <option value="1" style="color: black;">1 Click</option>
              <option value="2" style="color: black;">2 Clicks</option>
              <option value="3" style="color: black;">3 Clicks</option>
            </select>
          </label>

          <input type="text" id="export-filename" class="text-input" placeholder="Base file name..." />
          <button id="export-btn" class="btn secondary-btn" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            Export PDFs
          </button>
        </div>
      </header>

      <main class="workspace">
        <div id="loading" class="hidden">
          <div class="spinner"></div>
          <p>Processing PDF...</p>
        </div>
        
        <div id="pages-container" class="pages-grid">
          <!-- Pages will be rendered here -->
        </div>
        
        <div id="empty-state" class="empty-state">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          <p>No PDF loaded. Upload a document to get started.</p>
        </div>
      </main>
    </div>
  </body>
</html>
